{% extends "base.html" %}
{% block title %}Login — ShopPulse{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-16">
  <div class="text-center mb-8">
    <div class="text-4xl mb-3">👤</div>
    <h1 class="text-2xl font-bold text-gray-800">Sign in</h1>
    <p class="text-sm text-gray-500 mt-1">New here? <a href="/register" class="text-indigo-600 hover:underline">Create an account</a></p>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-5">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login" class="space-y-4">
    <input type="hidden" name="next" value="{{ next }}" />

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required autocomplete="email"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required autocomplete="current-password"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
