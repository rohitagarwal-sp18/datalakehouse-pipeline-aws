{% extends "base.html" %}
{% block title %}Register — ShopPulse{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-16">
  <div class="text-center mb-8">
    <div class="text-4xl mb-3">✨</div>
    <h1 class="text-2xl font-bold text-gray-800">Create account</h1>
    <p class="text-sm text-gray-500 mt-1">Already have one? <a href="/login" class="text-indigo-600 hover:underline">Sign in</a></p>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-5">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/register" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
      <input type="text" name="name" required autocomplete="name"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required autocomplete="email"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required minlength="8" autocomplete="new-password"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
    </div>

    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium">
      Create Account
    </button>
  </form>
</div>
{% endblock %}
